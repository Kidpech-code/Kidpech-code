name: Daily Profile Refresh

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily refresh timestamp in README
        run: |
          python <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone

          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8")
          marker = "<sub>Last profile refresh: "
          start = content.find(marker)
          if start == -1:
              raise SystemExit("Refresh marker not found in README.md")
          end = content.find("</sub>", start)
          if end == -1:
              raise SystemExit("Refresh marker closing tag not found in README.md")

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          replacement = f"<sub>Last profile refresh: {today} UTC</sub>"
          content = content[:start] + replacement + content[end + len("</sub>"):]
          readme.write_text(content, encoding="utf-8")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile README"
          git push
