name: Generate Snake Contribution SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # เพื่อให้สามารถ push ไป branch อื่นได้

      - uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: Kidpech-code
          outputs: |
            output/github-contribution-grid-snake.svg

      - name: Push SVG to output branch
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          message: "Generate contribution snake svg"
          add: "output/github-contribution-grid-snake.svg"
          default_author: github_actor
          push: true
